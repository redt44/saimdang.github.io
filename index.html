<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사임당FC 출석왕 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.96); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .top-rank-card { background: linear-gradient(135deg, #ff4e50 0%, #f9d423 100%); }
        input[type="password"] { letter-spacing: 0.2em; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    <div id="app"></div>

    <script>
        // 1. 초기 기본 선수 명단
        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        // 2. 앱 상태 관리
        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: localStorage.getItem('saimidang_admin_pw') || '1234',
            showLoginModal: false,
            attendance: JSON.parse(localStorage.getItem('saimidang_attendance')) || {},
            currentDate: new Date(),
            rankingDate: new Date(),
            rankingTab: 'monthly',
            searchTerm: '',
            players: JSON.parse(localStorage.getItem('saimidang_players')) || INITIAL_PLAYERS,
            modal: null // 커스텀 모달 상태 { type, title, message, isPassword, onConfirm }
        };

        // 3. 상태 업데이트 및 로컬스토리지 동기화
        function updateState(newState) {
            state = { ...state, ...newState };
            localStorage.setItem('saimidang_attendance', JSON.stringify(state.attendance));
            localStorage.setItem('saimidang_players', JSON.stringify(state.players));
            localStorage.setItem('saimidang_admin_pw', state.adminPassword);
            render();
        }

        // 커스텀 모달 호출 함수 (기본 alert, prompt, confirm 대체)
        function showModal(options) {
            updateState({ modal: options });
            if (options.type === 'prompt') {
                setTimeout(() => {
                    const input = document.getElementById('modalInput');
                    if (input) input.focus();
                }, 50);
            }
        }

        // 4. 기능 핸들러
        const handlers = {
            // 화면 전환
            changeView: (v) => updateState({ view: v, searchTerm: '' }),
            
            // 모달 제어
            closeModal: () => updateState({ modal: null }),
            
            handleModalConfirm: () => {
                const m = state.modal;
                let val = null;
                if (m.type === 'prompt') {
                    const input = document.getElementById('modalInput');
                    val = input ? input.value : '';
                }
                updateState({ modal: null }); 
                if (m.onConfirm) setTimeout(() => m.onConfirm(val), 10);
            },

            // 관리자 로그인 관련
            toggleLoginModal: (show) => {
                if (state.isAdmin && show) {
                    showModal({
                        type: 'confirm',
                        title: '로그아웃',
                        message: '관리자 모드를 해제하시겠습니까?',
                        onConfirm: () => {
                            updateState({ isAdmin: false, view: state.view === 'settings' ? 'dashboard' : state.view });
                        }
                    });
                    return;
                }
                updateState({ showLoginModal: show });
            },

            handleLogin: () => {
                const input = document.getElementById('pwInput');
                if (input && input.value === state.adminPassword) {
                    updateState({ isAdmin: true, showLoginModal: false });
                } else {
                    showModal({ type: 'alert', title: '로그인 실패', message: '비밀번호가 올바르지 않습니다.' });
                }
            },

            // [관리자 전용] 비밀번호 변경 기능
            updateAdminPw: () => {
                showModal({
                    type: 'prompt',
                    title: '비밀번호 확인',
                    message: '보안을 위해 현재 비밀번호를 입력하세요.',
                    isPassword: true,
                    onConfirm: (current) => {
                        if (current !== state.adminPassword) {
                            showModal({ type: 'alert', title: '인증 실패', message: '현재 비밀번호가 일치하지 않습니다.' });
                            return;
                        }
                        // 약간의 지연 후 새 비밀번호 입력창 띄우기 (애니메이션 겹침 방지)
                        setTimeout(() => {
                            showModal({
                                type: 'prompt',
                                title: '새 비밀번호',
                                message: '새롭게 사용할 비밀번호를 입력하세요.',
                                isPassword: true,
                                onConfirm: (next) => {
                                    if (next && next.trim()) {
                                        updateState({ adminPassword: next.trim() });
                                        showModal({ type: 'alert', title: '변경 완료', message: '비밀번호가 성공적으로 변경되었습니다.' });
                                    }
                                }
                            });
                        }, 300);
                    }
                });
            },

            // [관리자 전용] 선수 추가 기능
            addPlayer: () => {
                showModal({
                    type: 'prompt',
                    title: '선수 등록',
                    message: '추가할 선수의 이름을 입력해주세요.',
                    isPassword: false,
                    onConfirm: (name) => {
                        if (name && name.trim()) {
                            const nextId = state.players.length > 0 ? Math.max(...state.players.map(p => p.id)) + 1 : 1;
                            const newPlayer = { id: nextId, name: name.trim() };
                            updateState({ players: [...state.players, newPlayer] });
                            showModal({ type: 'alert', title: '등록 완료', message: `'${name.trim()}' 선수가 등록되었습니다.` });
                        }
                    }
                });
            },

            // [관리자 전용] 선수 삭제 기능
            delPlayer: (id, name) => {
                showModal({
                    type: 'confirm',
                    title: '선수 삭제',
                    message: `'${name}' 선수를 명단에서 삭제하시겠습니까?\n(해당 선수의 기존 출석 데이터는 유지되지만 목록에서는 제거됩니다.)`,
                    onConfirm: () => {
                        const updatedPlayers = state.players.filter(p => p.id !== id);
                        updateState({ players: updatedPlayers });
                    }
                });
            },

            // 출석 체크 토글
            toggleCheck: (pid) => {
                if (!state.isAdmin) return;
                const key = `${getYMD(state.currentDate)}-${pid}`;
                updateState({ 
                    attendance: { ...state.attendance, [key]: !state.attendance[key] } 
                });
            },

            // 날짜/월 조정
            adjustDate: (val) => {
                const d = new Date(state.currentDate);
                d.setDate(d.getDate() + val);
                updateState({ currentDate: d });
            },

            adjustMonth: (val) => {
                const d = new Date(state.rankingDate);
                d.setMonth(d.getMonth() + val);
                updateState({ rankingDate: d });
            }
        };

        // 전역 핸들러 연결
        Object.keys(handlers).forEach(key => window[key] = handlers[key]);

        // 유틸리티 함수
        const getYMD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getStats = (type, dateObj = state.rankingDate) => {
            const isMonthly = type === 'monthly';
            const prefix = isMonthly ? `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}` : '';
            
            return state.players.map(p => {
                const count = Object.keys(state.attendance).filter(k => 
                    (isMonthly ? k.startsWith(prefix) : true) && k.endsWith(`-${p.id}`) && state.attendance[k]
                ).length;
                return { ...p, count };
            }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        };

        // 5. 메인 렌더러
        function render() {
            const app = document.getElementById('app');
            const currentMonth = state.currentDate.getMonth() + 1;
            const topStats = getStats('monthly', state.currentDate);
            const top5 = topStats.slice(0, 5);

            // 순위 페이지용 데이터 및 최고 점수 계산 (그래프 비율 계산용)
            const rankingStats = getStats(state.rankingTab);
            const maxRankingCount = rankingStats.length > 0 ? Math.max(...rankingStats.map(s => s.count)) : 1;

            app.innerHTML = `
                <!-- 헤더 -->
                <header class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-100 z-50 px-6 py-5">
                    <div class="max-w-md mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-rose-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="shield" class="text-white w-5 h-5"></i></div>
                            <div>
                                <h1 class="text-xl font-black text-slate-800 leading-none tracking-tighter">사임당FC</h1>
                                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Attendance System</p>
                            </div>
                        </div>
                        <button onclick="toggleLoginModal(true)" class="px-4 py-2 rounded-xl text-[10px] font-black transition-all ${state.isAdmin ? 'bg-rose-50 text-rose-600 ring-1 ring-rose-100' : 'bg-slate-100 text-slate-400'}">
                            ${state.isAdmin ? 'ADMIN ACTIVE' : 'ADMIN LOGIN'}
                        </button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-5 space-y-6">
                    ${state.view === 'dashboard' ? `
                        <div class="animate-fade-in space-y-6">
                            <!-- 1위 강조 카드 -->
                            <div class="top-rank-card rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
                                <i data-lucide="trophy" class="absolute -right-8 -bottom-8 w-44 h-44 opacity-20 rotate-12"></i>
                                <div class="relative z-10">
                                    <div class="bg-white/20 w-fit px-4 py-1.5 rounded-full text-[10px] font-black mb-6 border border-white/30 backdrop-blur-sm uppercase tracking-widest">${currentMonth}월의 주인공</div>
                                    <p class="text-white/70 text-sm font-bold">현재 1위</p>
                                    <h2 class="text-5xl font-black mt-1 mb-8 tracking-tight">${topStats[0]?.count > 0 ? topStats[0].name : '기록 없음'}</h2>
                                    <div class="bg-white text-rose-600 w-fit px-5 py-2.5 rounded-2xl font-black text-xl shadow-xl shadow-rose-900/20">
                                        ${topStats[0]?.count || 0} <span class="text-xs ml-0.5">회 출석</span>
                                    </div>
                                </div>
                            </div>

                            <!-- TOP 5 리스트 -->
                            <div class="bg-white rounded-[40px] p-7 shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-6">
                                    <h3 class="text-lg font-black text-slate-800 flex items-center gap-2"><i data-lucide="award" class="text-amber-500 w-5 h-5"></i> 월간 랭킹 TOP 5</h3>
                                    <button onclick="changeView('ranking')" class="text-[11px] font-bold text-slate-300">더보기</button>
                                </div>
                                <div class="space-y-4">
                                    ${top5.map((r, i) => `
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-4">
                                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-lg font-black 
                                                    ${i === 0 ? 'bg-amber-100 text-amber-600' : i === 1 ? 'bg-slate-100 text-slate-400' : i === 2 ? 'bg-orange-100 text-orange-600' : 'bg-slate-50 text-slate-300'}">
                                                    ${i < 3 ? ['🥇','🥈','🥉'][i] : i + 1}
                                                </div>
                                                <span class="font-black text-slate-700 text-lg">${r.name}</span>
                                            </div>
                                            <p class="text-xl font-black ${r.count > 0 ? 'text-rose-600' : 'text-slate-200'}">${r.count}<span class="text-xs ml-0.5 font-bold text-slate-300">회</span></p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="changeView('attendance')" class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-center gap-3 active:scale-95 transition-all">
                                    <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center"><i data-lucide="calendar-days" class="w-7 h-7"></i></div>
                                    <span class="font-black text-slate-700">출석 체크</span>
                                </button>
                                <button onclick="changeView('ranking')" class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-center gap-3 active:scale-95 transition-all">
                                    <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center"><i data-lucide="bar-chart" class="w-7 h-7"></i></div>
                                    <span class="font-black text-slate-700">순위 통계</span>
                                </button>
                            </div>
                        </div>
                    ` : state.view === 'attendance' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-5">
                                ${!state.isAdmin ? `
                                    <div class="bg-amber-50 p-4 rounded-2xl flex items-center gap-3 text-amber-700 text-xs font-bold border border-amber-100">
                                        <i data-lucide="info" class="w-4 h-4"></i> 관리자만 출석을 체크할 수 있습니다.
                                    </div>
                                ` : ''}
                                <div class="flex items-center justify-between">
                                    <button onclick="adjustDate(-1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100"><i data-lucide="chevron-left" class="w-6 h-6 text-slate-400"></i></button>
                                    <div class="text-center">
                                        <p class="text-[10px] font-black text-rose-500 tracking-widest uppercase">${state.currentDate.getFullYear()}.${state.currentDate.getMonth()+1}</p>
                                        <h2 class="text-2xl font-black text-slate-800">${state.currentDate.getDate()}일 출석부</h2>
                                    </div>
                                    <button onclick="adjustDate(1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100"><i data-lucide="chevron-right" class="w-6 h-6 text-slate-400"></i></button>
                                </div>
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                                    <input type="text" placeholder="선수 이름으로 찾기..." oninput="state.searchTerm=this.value; renderAttendanceList()" class="w-full bg-slate-50 border-none rounded-2xl py-5 pl-14 pr-6 text-sm focus:ring-2 focus:ring-rose-500 outline-none">
                                </div>
                            </div>
                            <div id="attendanceItems" class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-y-auto custom-scroll max-h-[calc(100vh-350px)] divide-y divide-slate-50 min-h-[300px]">
                                <!-- 리스트 -->
                            </div>
                        </div>
                    ` : state.view === 'ranking' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-6 text-center">
                                <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                                    <button onclick="updateState({rankingTab:'monthly'})" class="flex-1 py-3.5 text-xs font-black rounded-xl transition-all ${state.rankingTab==='monthly'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}">월간 순위</button>
                                    <button onclick="updateState({rankingTab:'total'})" class="flex-1 py-3.5 text-xs font-black rounded-xl transition-all ${state.rankingTab==='total'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}">전체 누적</button>
                                </div>
                                ${state.rankingTab === 'monthly' ? `
                                    <div class="flex items-center justify-center gap-8">
                                        <button onclick="adjustMonth(-1)" class="text-slate-300 hover:text-rose-500"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                                        <p class="font-black text-slate-800 text-xl">${state.rankingDate.getFullYear()}년 ${state.rankingDate.getMonth()+1}월</p>
                                        <button onclick="adjustMonth(1)" class="text-slate-300 hover:text-rose-500"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                                    </div>
                                ` : '<p class="font-black text-slate-800 text-xl py-2 tracking-widest uppercase text-rose-600">All-Time Hall of Fame</p>'}
                            </div>
                            
                            <!-- 개선된 순위 리스트 -->
                            <div class="space-y-3 pb-6 overflow-y-auto custom-scroll max-h-[calc(100vh-350px)] pr-2">
                                ${rankingStats.map((r, i) => {
                                    // 1등 대비 현재 선수의 비율 (%) - 최소 2% 보장하여 바가 보이도록 설정
                                    const pct = Math.max((r.count / (maxRankingCount || 1)) * 100, 2);
                                    
                                    // 1~3위 디자인 (독립된 카드형)
                                    if (i < 3) {
                                        const styles = [
                                            { border: 'border-amber-200', bg: 'bg-gradient-to-r from-amber-50 to-white', iconBg: 'bg-amber-100 text-amber-600', icon: '🥇', bar: 'bg-amber-400' },
                                            { border: 'border-slate-200', bg: 'bg-gradient-to-r from-slate-50 to-white', iconBg: 'bg-slate-100 text-slate-500', icon: '🥈', bar: 'bg-slate-300' },
                                            { border: 'border-orange-200', bg: 'bg-gradient-to-r from-orange-50 to-white', iconBg: 'bg-orange-100 text-orange-600', icon: '🥉', bar: 'bg-orange-400' }
                                        ][i];
                                        
                                        return `
                                            <div class="relative overflow-hidden rounded-[32px] border-2 ${styles.border} ${styles.bg} shadow-sm transform transition-all hover:scale-[1.02]">
                                                <div class="p-5 flex items-center justify-between relative z-10">
                                                    <div class="flex items-center gap-5">
                                                        <div class="w-12 h-12 rounded-[20px] flex items-center justify-center text-2xl shadow-inner ${styles.iconBg}">${styles.icon}</div>
                                                        <div>
                                                            <p class="text-xl font-bold text-slate-800">${r.name}</p>
                                                            <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Member No. ${r.id}</p>
                                                        </div>
                                                    </div>
                                                    <div class="flex flex-col items-end">
                                                        <div class="flex items-baseline gap-1">
                                                            <span class="text-3xl font-black text-slate-800">${r.count}</span>
                                                            <span class="text-xs font-bold text-slate-400">회</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- 하단 프로그레스 바 -->
                                                <div class="absolute bottom-0 left-0 h-1.5 ${styles.bar} rounded-r-full transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                                            </div>
                                        `;
                                    }
                                    
                                    // 4위 이하 디자인 (리스트 바 차트형)
                                    return `
                                        <div class="relative overflow-hidden bg-white rounded-[24px] border border-slate-100 shadow-sm p-4 flex items-center justify-between">
                                            <!-- 배경 프로그레스 바 -->
                                            <div class="absolute top-0 left-0 h-full bg-rose-50/70 rounded-r-3xl transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                                            
                                            <div class="flex items-center gap-4 relative z-10">
                                                <span class="w-10 text-center font-black text-xl text-slate-300">${i+1}</span>
                                                <div>
                                                    <p class="text-lg font-bold text-slate-700">${r.name}</p>
                                                </div>
                                            </div>
                                            <div class="relative z-10 flex items-baseline gap-1">
                                                <span class="text-2xl font-black text-rose-500">${r.count}</span>
                                                <span class="text-[10px] font-bold text-slate-400">회</span>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    ` : state.view === 'settings' ? `
                        <div class="space-y-6 animate-fade-in pb-10">
                            <!-- 비밀번호 변경 구역 -->
                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <h3 class="font-black text-slate-800 mb-6 flex items-center gap-3"><i data-lucide="key" class="text-rose-500 w-5 h-5"></i> 관리자 보안</h3>
                                <button onclick="updateAdminPw()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                                    비밀번호 변경하기
                                </button>
                            </div>

                            <!-- 선수 목록 관리 구역 -->
                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <div class="flex items-center justify-between mb-8">
                                    <h3 class="font-black text-slate-800 flex items-center gap-3"><i data-lucide="users-round" class="text-rose-500 w-5 h-5"></i> 선수 명단 관리</h3>
                                    <button onclick="addPlayer()" class="px-5 py-2.5 bg-rose-600 text-white rounded-xl font-black text-xs">선수 등록</button>
                                </div>
                                <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                                    ${state.players.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div class="flex items-center gap-4">
                                                <span class="text-[10px] font-black text-slate-300">#${p.id}</span>
                                                <span class="font-bold text-slate-700 text-lg">${p.name}</span>
                                            </div>
                                            <button onclick="delPlayer(${p.id}, '${p.name}')" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                                                <i data-lucide="user-minus" class="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </main>

                <!-- 로그인 모달 -->
                ${state.showLoginModal ? `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-xs rounded-[40px] p-8 shadow-2xl animate-fade-in text-center">
                            <div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="lock" class="w-8 h-8"></i></div>
                            <h3 class="text-2xl font-black text-slate-800 mb-2">관리자 인증</h3>
                            <p class="text-[11px] text-slate-400 font-bold mb-8 uppercase tracking-widest tracking-widest">Enter Password</p>
                            <input id="pwInput" type="password" onkeyup="if(event.key==='Enter')handleLogin()" placeholder="••••" class="w-full bg-slate-50 border-none rounded-2xl py-6 px-6 text-center text-3xl focus:ring-2 focus:ring-rose-500 outline-none mb-8 shadow-inner">
                            <div class="flex gap-4">
                                <button onclick="toggleLoginModal(false)" class="flex-1 py-5 bg-slate-100 text-slate-400 font-bold rounded-2xl">닫기</button>
                                <button onclick="handleLogin()" class="flex-1 py-5 bg-rose-600 text-white font-bold rounded-2xl">로그인</button>
                            </div>
                        </div>
                    </div>
                ` : ''}

                <!-- 커스텀 얼럿/프롬프트/컨펌 모달 -->
                ${state.modal ? `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[120] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl animate-fade-in text-center">
                            ${state.modal.type === 'alert' ? '<div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="info" class="w-8 h-8"></i></div>' : ''}
                            ${state.modal.type === 'confirm' ? '<div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="help-circle" class="w-8 h-8"></i></div>' : ''}
                            ${state.modal.type === 'prompt' ? '<div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="edit-3" class="w-8 h-8"></i></div>' : ''}
                            
                            <h3 class="text-2xl font-black text-slate-800 mb-2">${state.modal.title}</h3>
                            <p class="text-[13px] text-slate-500 font-bold mb-8 whitespace-pre-wrap leading-relaxed">${state.modal.message}</p>
                            
                            ${state.modal.type === 'prompt' ? `
                                <input id="modalInput" type="${state.modal.isPassword ? 'password' : 'text'}" 
                                       class="w-full bg-slate-50 border-none rounded-2xl py-5 px-6 text-center text-xl focus:ring-2 focus:ring-indigo-500 outline-none mb-8 shadow-inner"
                                       onkeyup="if(event.key==='Enter') handleModalConfirm()">
                            ` : ''}
                            
                            <div class="flex gap-4">
                                ${state.modal.type !== 'alert' ? `
                                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl active:scale-95 transition-all">취소</button>
                                ` : ''}
                                <button onclick="handleModalConfirm()" class="flex-1 py-4 ${state.modal.type === 'confirm' ? 'bg-amber-500' : state.modal.type === 'prompt' ? 'bg-indigo-600' : 'bg-rose-600'} text-white font-bold rounded-2xl active:scale-95 transition-all">확인</button>
                            </div>
                        </div>
                    </div>
                ` : ''}

                <!-- 하단 네비게이션 -->
                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900/95 backdrop-blur-2xl rounded-[40px] p-3 shadow-2xl z-50 border border-white/10 flex justify-between items-center">
                    <button onclick="changeView('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all ${state.view==='dashboard'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="text-[10px] font-bold">홈</span>
                    </button>
                    <button onclick="changeView('attendance')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all ${state.view==='attendance'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="check-square" class="w-6 h-6"></i><span class="text-[10px] font-bold">출석</span>
                    </button>
                    <button onclick="changeView('ranking')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all ${state.view==='ranking'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-[10px] font-bold">순위</span>
                    </button>
                    ${state.isAdmin ? `
                        <button onclick="changeView('settings')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all ${state.view==='settings'?'text-white bg-white/10':'text-slate-500'}">
                            <i data-lucide="user-cog" class="w-6 h-6"></i><span class="text-[10px] font-bold">설정</span>
                        </button>
                    ` : ''}
                </nav>
            `;
            lucide.createIcons();
            if (state.view === 'attendance') renderAttendanceList();
        }

        function renderAttendanceList() {
            const container = document.getElementById('attendanceItems');
            if (!container) return;
            const today = getYMD(state.currentDate);
            const filtered = state.players.filter(p => p.name.includes(state.searchTerm));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-300 font-bold">선수를 찾을 수 없습니다.</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => {
                const isCheck = state.attendance[`${today}-${p.id}`];
                return `
                    <div onclick="toggleCheck(${p.id})" class="flex items-center justify-between p-6 cursor-pointer active:bg-slate-50 transition-all">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-[10px] font-bold text-slate-300 border border-slate-100">${p.id}</span>
                            <span class="text-xl font-bold text-slate-700">${p.name}</span>
                        </div>
                        <div class="px-5 py-2.5 rounded-2xl text-sm font-black transition-all ${isCheck ? 'bg-green-100 text-green-700 ring-1 ring-green-200' : 'bg-slate-50 text-slate-300'}">
                            ${isCheck ? '출석 완료' : '결석'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 앱 구동
        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
