<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 모바일 앱처럼 보이게 하는 PWA 메타 태그 추가 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F8FAFC">
    <title>사임당FC 출석왕 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.96); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .top-rank-card { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); }
        input[type="password"] { letter-spacing: 0.1em; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    <div id="app"></div>

    <script>
        // 1. 초기 데이터
        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        // 2. 상태 관리
        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: localStorage.getItem('saimidang_admin_pw') || '1234',
            attendance: JSON.parse(localStorage.getItem('saimidang_attendance')) || {},
            currentDate: new Date(),
            rankingDate: new Date(),
            rankingTab: 'monthly',
            searchTerm: '',
            players: JSON.parse(localStorage.getItem('saimidang_players')) || INITIAL_PLAYERS,
            activeModal: null, 
            modalData: null,
            alertMessage: ''
        };

        window.updateState = function(newState) {
            state = { ...state, ...newState };
            localStorage.setItem('saimidang_attendance', JSON.stringify(state.attendance));
            localStorage.setItem('saimidang_players', JSON.stringify(state.players));
            localStorage.setItem('saimidang_admin_pw', state.adminPassword);
            render();
        };

        window.changeView = (v) => updateState({ view: v, searchTerm: '' });

        // 자체 모달 제어 기능
        window.closeModal = () => updateState({ activeModal: null, alertMessage: '', modalData: null });

        window.toggleLoginModal = (show) => {
            if (state.isAdmin && show) {
                updateState({ activeModal: 'confirmLogout' });
            } else {
                updateState({ activeModal: show ? 'login' : null, alertMessage: '' });
            }
        };

        window.handleLogin = () => {
            const input = document.getElementById('pwInput');
            if (input && input.value === state.adminPassword) {
                updateState({ isAdmin: true, activeModal: null, alertMessage: '' });
            } else {
                updateState({ alertMessage: '비밀번호가 일치하지 않습니다.' });
            }
        };

        window.handleLogout = () => {
            updateState({ isAdmin: false, view: 'dashboard', activeModal: null });
        };

        // 비밀번호 변경 기능
        window.openChangePwModal = () => updateState({ activeModal: 'changePw', alertMessage: '' });
        window.handleChangePw = () => {
            const current = document.getElementById('currentPwInput').value;
            const next = document.getElementById('newPwInput').value;
            if (current !== state.adminPassword) {
                updateState({ alertMessage: '현재 비밀번호가 올바르지 않습니다.' });
                return;
            }
            if (!next || !next.trim()) {
                updateState({ alertMessage: '새 비밀번호를 입력해주세요.' });
                return;
            }
            updateState({ adminPassword: next.trim(), activeModal: 'alert', alertMessage: '비밀번호가 성공적으로 변경되었습니다.' });
        };

        // 선수 등록 기능
        window.openAddPlayerModal = () => updateState({ activeModal: 'addPlayer', alertMessage: '' });
        window.handleAddPlayer = () => {
            const name = document.getElementById('playerNameInput').value;
            if (name && name.trim()) {
                const nextId = state.players.length > 0 ? Math.max(...state.players.map(p => p.id)) + 1 : 1;
                updateState({ 
                    players: [...state.players, { id: nextId, name: name.trim() }],
                    activeModal: 'alert',
                    alertMessage: `'${name.trim()}' 선수가 등록되었습니다.`
                });
            } else {
                updateState({ alertMessage: '이름을 입력해주세요.' });
            }
        };

        // 선수 삭제 기능
        window.openDelPlayerModal = (id, name) => updateState({ activeModal: 'delPlayer', modalData: { id, name } });
        window.handleDelPlayer = () => {
            const id = state.modalData.id;
            updateState({ 
                players: state.players.filter(p => p.id !== id),
                activeModal: 'alert',
                alertMessage: '선수가 명단에서 삭제되었습니다.'
            });
        };

        window.toggleCheck = (pid) => {
            if (!state.isAdmin) return;
            const key = `${getYMD(state.currentDate)}-${pid}`;
            updateState({ 
                attendance: { ...state.attendance, [key]: !state.attendance[key] } 
            });
        };

        window.adjustDate = (val) => {
            const d = new Date(state.currentDate);
            d.setDate(d.getDate() + val);
            updateState({ currentDate: d });
        };

        window.adjustMonth = (val) => {
            const d = new Date(state.rankingDate);
            d.setMonth(d.getMonth() + val);
            updateState({ rankingDate: d });
        };

        window.handleSearch = (val) => {
            state.searchTerm = val;
            renderAttendanceList();
        };

        // 유틸리티
        const getYMD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getStats = (type, dateObj = state.rankingDate) => {
            const isMonthly = type === 'monthly';
            const prefix = isMonthly ? `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}` : '';
            return state.players.map(p => {
                const count = Object.keys(state.attendance).filter(k => 
                    (isMonthly ? k.startsWith(prefix) : true) && k.endsWith(`-${p.id}`) && state.attendance[k]
                ).length;
                return { ...p, count };
            }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        };

        // 모달 렌더링 헬퍼
        const renderModalContent = () => {
            switch(state.activeModal) {
                case 'login': return `
                    <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
                    <h3 class="text-2xl font-black text-slate-800 mb-2">관리자 인증</h3>
                    <p class="text-slate-400 text-xs mb-4 font-bold uppercase tracking-widest">Admin Access</p>
                    ${state.alertMessage ? `<p class="text-red-500 text-sm font-bold mb-4 animate-fade-in">${state.alertMessage}</p>` : ''}
                    <input id="pwInput" type="password" onkeyup="if(event.key==='Enter')window.handleLogin()" placeholder="비밀번호 입력" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-5 px-6 text-center text-xl focus:ring-2 focus:ring-orange-500 outline-none mb-6">
                    <div class="flex gap-4">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>
                        <button onclick="window.handleLogin()" class="flex-1 py-4 bg-orange-500 text-white font-bold rounded-2xl">로그인</button>
                    </div>
                `;
                case 'confirmLogout': return `
                    <h3 class="text-2xl font-black text-slate-800 mb-4 mt-2">로그아웃</h3>
                    <p class="text-slate-500 mb-8 font-bold">관리자 모드를 종료하시겠습니까?</p>
                    <div class="flex gap-4">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>
                        <button onclick="window.handleLogout()" class="flex-1 py-4 bg-orange-500 text-white font-bold rounded-2xl">종료</button>
                    </div>
                `;
                case 'changePw': return `
                    <h3 class="text-xl font-black text-slate-800 mb-6">관리자 비밀번호 변경</h3>
                    ${state.alertMessage ? `<p class="text-red-500 text-sm font-bold mb-4 animate-fade-in">${state.alertMessage}</p>` : ''}
                    <input id="currentPwInput" type="password" placeholder="현재 비밀번호" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-4 text-center text-lg focus:ring-2 focus:ring-orange-500 outline-none mb-3">
                    <input id="newPwInput" type="password" onkeyup="if(event.key==='Enter')window.handleChangePw()" placeholder="새 비밀번호" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-4 text-center text-lg focus:ring-2 focus:ring-orange-500 outline-none mb-8">
                    <div class="flex gap-4">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>
                        <button onclick="window.handleChangePw()" class="flex-1 py-4 bg-slate-900 text-white font-bold rounded-2xl">변경하기</button>
                    </div>
                `;
                case 'addPlayer': return `
                    <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="user-plus" class="w-8 h-8"></i></div>
                    <h3 class="text-xl font-black text-slate-800 mb-6">신규 선수 등록</h3>
                    ${state.alertMessage ? `<p class="text-red-500 text-sm font-bold mb-4 animate-fade-in">${state.alertMessage}</p>` : ''}
                    <input id="playerNameInput" type="text" onkeyup="if(event.key==='Enter')window.handleAddPlayer()" placeholder="선수 이름 (예: 김사임)" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-5 px-4 text-center text-lg focus:ring-2 focus:ring-orange-500 outline-none mb-8">
                    <div class="flex gap-4">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>
                        <button onclick="window.handleAddPlayer()" class="flex-1 py-4 bg-orange-500 text-white font-bold rounded-2xl">등록하기</button>
                    </div>
                `;
                case 'delPlayer': return `
                    <div class="w-16 h-16 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="alert-triangle" class="w-8 h-8"></i></div>
                    <h3 class="text-xl font-black text-slate-800 mb-4">선수 삭제 경고</h3>
                    <p class="text-slate-500 mb-8 font-bold leading-relaxed"><span class="text-red-500 text-lg">"${state.modalData?.name}"</span> 선수를 명단에서<br>정말 삭제하시겠습니까?</p>
                    <div class="flex gap-4">
                        <button onclick="window.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>
                        <button onclick="window.handleDelPlayer()" class="flex-1 py-4 bg-red-500 text-white font-bold rounded-2xl">삭제하기</button>
                    </div>
                `;
                case 'alert': return `
                    <div class="w-16 h-16 bg-green-50 text-green-500 rounded-3xl flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle-2" class="w-8 h-8"></i></div>
                    <h3 class="text-xl font-black text-slate-800 mb-8 leading-relaxed">${state.alertMessage}</h3>
                    <button onclick="window.closeModal()" class="w-full py-4 bg-orange-500 text-white font-bold rounded-2xl">확인</button>
                `;
                default: return '';
            }
        };

        // 5. 메인 렌더링
        function render() {
            const app = document.getElementById('app');
            if (!app) return;

            const totalStats = getStats('total');
            const monthlyStats = getStats('monthly', state.currentDate);
            const top5 = monthlyStats.slice(0, 5);

            // 누적 출석왕 동률 계산 로직
            let topNames = '기록 없음';
            let topCount = 0;
            let isTie = false;
            
            if (totalStats.length > 0 && totalStats[0].count > 0) {
                topCount = totalStats[0].count;
                // 최고 점수와 같은 점수를 가진 모든 선수 필터링
                const topPlayers = totalStats.filter(p => p.count === topCount);
                topNames = topPlayers.map(p => p.name).join(', ');
                isTie = topPlayers.length > 1;
            }

            app.innerHTML = `
                <header class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-100 z-40 px-6 py-5">
                    <div class="max-w-md mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="shield" class="text-white w-5 h-5"></i></div>
                            <div>
                                <h1 class="text-xl font-black text-slate-800 tracking-tighter">사임당FC</h1>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Attendance</p>
                            </div>
                        </div>
                        <button onclick="window.toggleLoginModal(true)" class="px-4 py-2 rounded-xl text-[10px] font-black transition-all hover:opacity-80 ${state.isAdmin ? 'bg-orange-100 text-orange-600 ring-1 ring-orange-200' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}">
                            ${state.isAdmin ? '관리자 모드' : '관리자 로그인'}
                        </button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-5 space-y-6">
                    ${state.view === 'dashboard' ? `
                        <div class="animate-fade-in space-y-6">
                            <div class="top-rank-card rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
                                <i data-lucide="trophy" class="absolute -right-8 -bottom-8 w-44 h-44 opacity-20 rotate-12"></i>
                                <div class="relative z-10">
                                    <div class="bg-white/20 w-fit px-4 py-1.5 rounded-full text-[11px] font-black mb-6 border border-white/30 backdrop-blur-sm tracking-widest">
                                        2026년 누적 출석왕
                                    </div>
                                    <p class="text-white/80 text-sm font-bold mb-1">${topCount > 0 ? (isTie ? '공동 1위' : '단독 1위') : '-'}</p>
                                    <h2 class="text-3xl sm:text-4xl font-black mb-8 tracking-tight break-keep leading-snug">
                                        ${topNames}
                                    </h2>
                                    <div class="bg-white text-orange-600 w-fit px-5 py-2.5 rounded-2xl font-black text-xl shadow-xl flex items-center gap-2">
                                        <i data-lucide="flame" class="w-5 h-5"></i>
                                        총 ${topCount} <span class="text-xs ml-0.5">회</span>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white rounded-[40px] p-7 shadow-sm border border-slate-100">
                                <div class="flex items-center justify-between mb-6">
                                    <h3 class="text-lg font-black text-slate-800 flex items-center gap-2"><i data-lucide="award" class="text-amber-500 w-5 h-5"></i> ${state.currentDate.getMonth() + 1}월 출석 현황</h3>
                                    <button onclick="window.changeView('ranking')" class="text-[11px] font-bold text-slate-300">상세보기</button>
                                </div>
                                <div class="space-y-4">
                                    ${top5.map((r, i) => `
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-4">
                                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-lg font-black ${i < 3 ? 'bg-orange-50 text-orange-500' : 'bg-slate-50 text-slate-300'}">
                                                    ${i + 1}
                                                </div>
                                                <span class="font-black text-slate-700 text-lg">${r.name}</span>
                                            </div>
                                            <p class="text-xl font-black ${r.count > 0 ? 'text-orange-600' : 'text-slate-200'}">${r.count}<span class="text-xs ml-0.5 font-bold text-slate-300">회</span></p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : state.view === 'attendance' ? `
                        <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden animate-fade-in">
                            <div class="p-6 space-y-5 border-b border-slate-50">
                                <div class="flex items-center justify-between">
                                    <button onclick="window.adjustDate(-1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-colors"><i data-lucide="chevron-left" class="w-6 h-6 text-slate-400"></i></button>
                                    <div class="text-center">
                                        <p class="text-[10px] font-black text-orange-500 tracking-widest uppercase">${state.currentDate.getFullYear()}년 ${state.currentDate.getMonth()+1}월</p>
                                        <h2 class="text-2xl font-black text-slate-800">${state.currentDate.getDate()}일 출석부</h2>
                                    </div>
                                    <button onclick="window.adjustDate(1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-colors"><i data-lucide="chevron-right" class="w-6 h-6 text-slate-400"></i></button>
                                </div>
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                                    <input type="text" placeholder="선수 이름 검색..." oninput="window.handleSearch(this.value)" class="w-full bg-slate-50 border-none rounded-2xl py-5 pl-14 pr-6 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
                                </div>
                            </div>
                            <div id="attendanceItems" class="divide-y divide-slate-50 min-h-[300px]"></div>
                        </div>
                    ` : state.view === 'ranking' ? `
                        <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden animate-fade-in">
                            <div class="p-6 space-y-6 text-center border-b border-slate-50">
                                <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                                    <button onclick="window.updateState({rankingTab:'monthly'})" class="flex-1 py-3.5 text-xs font-black rounded-xl ${state.rankingTab==='monthly'?'bg-white text-orange-600 shadow-sm':'text-slate-400'}">월간</button>
                                    <button onclick="window.updateState({rankingTab:'total'})" class="flex-1 py-3.5 text-xs font-black rounded-xl ${state.rankingTab==='total'?'bg-white text-orange-600 shadow-sm':'text-slate-400'}">전체</button>
                                </div>
                                ${state.rankingTab === 'monthly' ? `
                                    <div class="flex items-center justify-center gap-8 py-2">
                                        <button onclick="window.adjustMonth(-1)" class="text-slate-300 hover:text-orange-500 transition-colors"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                                        <p class="font-black text-slate-800 text-xl">${state.rankingDate.getFullYear()}년 ${state.rankingDate.getMonth()+1}월</p>
                                        <button onclick="window.adjustMonth(1)" class="text-slate-300 hover:text-orange-500 transition-colors"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                                    </div>
                                ` : '<p class="font-black text-orange-600 text-xl py-2 tracking-widest">모든 출석 기록</p>'}
                            </div>
                            <div class="divide-y divide-slate-50">
                                ${getStats(state.rankingTab).map((r, i) => `
                                    <div class="p-6 flex items-center justify-between">
                                        <div class="flex items-center gap-6">
                                            <span class="w-8 font-black text-3xl ${i<3?'text-orange-500':'text-slate-100'}">${i+1}</span>
                                            <div>
                                                <p class="text-xl font-bold text-slate-800">${r.name}</p>
                                                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Saim Player</p>
                                            </div>
                                        </div>
                                        <p class="text-3xl font-black text-slate-800">${r.count}<span class="text-xs font-bold text-slate-300 ml-1">회</span></p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : state.view === 'settings' ? `
                        <div class="space-y-6 animate-fade-in pb-10">
                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <h3 class="font-black text-slate-800 mb-6 flex items-center gap-3"><i data-lucide="lock" class="text-orange-500 w-5 h-5"></i> 보안 설정</h3>
                                <button onclick="window.openChangePwModal()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold active:bg-slate-800 transition-colors">
                                    관리자 비밀번호 변경
                                </button>
                            </div>

                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <div class="flex items-center justify-between mb-8">
                                    <h3 class="font-black text-slate-800 flex items-center gap-3"><i data-lucide="users" class="text-orange-500 w-5 h-5"></i> 선수 명단</h3>
                                    <button onclick="window.openAddPlayerModal()" class="px-5 py-2.5 bg-orange-500 text-white rounded-xl font-black text-xs">선수 추가</button>
                                </div>
                                <div class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scroll">
                                    ${state.players.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <span class="font-bold text-slate-700 text-lg">${p.name}</span>
                                            <button onclick="window.openDelPlayerModal(${p.id}, '${p.name}')" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </main>

                <!-- 중앙 제어 자체 모달 창 -->
                ${state.activeModal ? `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-fade-in">
                        <div class="bg-white w-full max-w-xs rounded-[40px] p-8 shadow-2xl text-center relative">
                            ${renderModalContent()}
                        </div>
                    </div>
                ` : ''}

                <!-- 하단 내비 -->
                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900/95 backdrop-blur-2xl rounded-[40px] p-3 shadow-2xl z-40 flex justify-around items-center border border-white/10">
                    <button onclick="window.changeView('dashboard')" class="px-6 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all hover:bg-white/20 ${state.view==='dashboard'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">홈</span>
                    </button>
                    <button onclick="window.changeView('attendance')" class="px-6 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all hover:bg-white/20 ${state.view==='attendance'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="calendar-check" class="w-6 h-6"></i><span class="text-[10px] font-bold">출석</span>
                    </button>
                    <button onclick="window.changeView('ranking')" class="px-6 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all hover:bg-white/20 ${state.view==='ranking'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="trending-up" class="w-6 h-6"></i><span class="text-[10px] font-bold">순위</span>
                    </button>
                    ${state.isAdmin ? `
                        <button onclick="window.changeView('settings')" class="px-6 py-3 flex flex-col items-center gap-1 rounded-[28px] transition-all hover:bg-white/20 ${state.view==='settings'?'text-white bg-white/10':'text-slate-500'}">
                            <i data-lucide="settings-2" class="w-6 h-6"></i><span class="text-[10px] font-bold">설정</span>
                        </button>
                    ` : ''}
                </nav>
            `;
            
            lucide.createIcons();
            if (state.view === 'attendance') renderAttendanceList();
            
            // 모달 오픈 시 자동 포커스
            if (state.activeModal === 'login') setTimeout(() => document.getElementById('pwInput')?.focus(), 50);
            if (state.activeModal === 'changePw') setTimeout(() => document.getElementById('currentPwInput')?.focus(), 50);
            if (state.activeModal === 'addPlayer') setTimeout(() => document.getElementById('playerNameInput')?.focus(), 50);
        }

        function renderAttendanceList() {
            const container = document.getElementById('attendanceItems');
            if (!container) return;
            const today = getYMD(state.currentDate);
            const filtered = state.players.filter(p => p.name.includes(state.searchTerm));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-300 font-bold italic">검색 결과 없음</div>`;
                return;
            }

            container.innerHTML = filtered.map(p => {
                const isCheck = state.attendance[`${today}-${p.id}`];
                return `
                    <div onclick="window.toggleCheck(${p.id})" class="flex items-center justify-between p-6 cursor-pointer hover:bg-slate-50 active:bg-slate-100 transition-all ${!state.isAdmin ? 'opacity-70 pointer-events-none' : ''}">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-[10px] font-bold text-slate-300 border border-slate-100">${p.id}</span>
                            <span class="text-xl font-bold text-slate-700">${p.name}</span>
                        </div>
                        <div class="px-5 py-2.5 rounded-2xl text-sm font-black transition-all ${isCheck ? 'bg-green-100 text-green-700' : 'bg-slate-50 text-slate-300'}">
                            ${isCheck ? '출석 완료' : '결석'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.onload = render;
    </script>
</body>
</html>
