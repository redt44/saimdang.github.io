<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사임당FC 출석왕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loading-screen { transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    
    <!-- 상태 안내 로딩 화면 -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center p-8 text-center">
        <div id="status-icon" class="w-20 h-20 bg-rose-50 text-rose-600 rounded-[2.5rem] flex items-center justify-center animate-pulse mb-6 shadow-xl border border-rose-100">
            <i data-lucide="refresh-cw" id="icon-inner" class="w-10 h-10"></i>
        </div>
        <h2 id="status-title" class="text-xl font-black mb-2 text-slate-800">데이터 연결 중...</h2>
        <p id="status-desc" class="text-slate-400 font-medium text-sm leading-relaxed">
            최신 정보를 가져오고 있습니다.<br>잠시만 기다려주세요.
        </p>
        
        <div id="retry-btn-container" class="hidden mt-8 w-full max-w-xs">
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-sm font-bold shadow-xl active:scale-95 transition-transform">다시 시도하기</button>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (saimdang-c8744)
        const firebaseConfig = {
            apiKey: "AIzaSyAaoiX97HAWTjzhFRb0tAxOqtb5Pv42lEA",
            authDomain: "saimdang-c8744.firebaseapp.com",
            projectId: "saimdang-c8744",
            storageBucket: "saimdang-c8744.firebasestorage.app",
            messagingSenderId: "1018293325196",
            appId: "1:1018293325196:web:f1536839991aaf241c1aa9"
        };

        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: '1234',
            showLoginModal: false,
            attendance: {},
            currentDate: new Date(),
            rankingTab: 'monthly',
            players: INITIAL_PLAYERS
        };

        let db, docRef;

        const init = async () => {
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');
            const retryBtn = document.getElementById('retry-btn-container');

            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                // Firestore 캐시 및 다중 탭 지원 초기화
                db = initializeFirestore(app, {
                    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
                });

                // 익명 로그인 에러 상세 출력
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    throw new Error("인증 실패: " + e.message);
                }

                // 정확한 데이터 경로 (규칙 위반 방지)
                const appId = "saimdang-v1";
                docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_store');

                // 실시간 리스너 연결
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        state.attendance = data.attendance || {};
                        state.players = data.players || INITIAL_PLAYERS;
                        state.adminPassword = data.adminPassword || '1234';
                    } else {
                        // 초기 데이터 생성
                        setDoc(docRef, { 
                            attendance: {}, 
                            players: INITIAL_PLAYERS, 
                            adminPassword: '1234' 
                        });
                    }
                    hideLoading();
                    render();
                }, (err) => {
                    console.error("Firestore Snapshot Error:", err);
                    statusTitle.innerText = "DB 접근 권한 없음";
                    statusDesc.innerHTML = `<span class="text-xs text-red-500 font-bold">${err.message}</span><br><br>도메인 승인(Authorized domains)이 아직 반영되지 않았을 수 있습니다. 잠시 후 다시 시도해주세요.`;
                    retryBtn.classList.remove('hidden');
                });

            } catch (error) {
                console.error("App Init Error:", error);
                statusTitle.innerText = "연결 오류 상세 내역";
                statusDesc.innerHTML = `<span class="text-xs text-red-500 font-bold break-words">${error.message}</span><br><br>이 화면을 캡처해서 알려주세요!`;
                retryBtn.classList.remove('hidden');
            }
        };

        const hideLoading = () => {
            const loader = document.getElementById('loading-screen');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };

        const save = async () => {
            if (!docRef) return;
            try {
                await setDoc(docRef, {
                    attendance: state.attendance,
                    players: state.players,
                    adminPassword: state.adminPassword
                });
            } catch (e) {
                console.error("저장 실패:", e);
                alert("데이터 저장에 실패했습니다.");
            }
        };

        window.toggleCheck = async (pid) => {
            if (!state.isAdmin) return alert('관리자 로그인이 필요합니다.');
            const key = `${state.currentDate.toISOString().split('T')[0]}-${pid}`;
            state.attendance[key] = !state.attendance[key];
            render();
            await save();
        };

        window.handleLogin = () => {
            const pw = document.getElementById('pwInput').value;
            if (pw === state.adminPassword) {
                state.isAdmin = true;
                state.showLoginModal = false;
                render();
            } else {
                alert('비밀번호가 일치하지 않습니다.');
            }
        };

        const getStats = () => {
            const isMonthly = state.rankingTab === 'monthly';
            const prefix = isMonthly ? state.currentDate.toISOString().slice(0, 7) : '';
            return state.players.map(p => ({
                ...p,
                count: Object.keys(state.attendance).filter(k => k.startsWith(prefix) && k.endsWith(`-${p.id}`) && state.attendance[k]).length
            })).sort((a, b) => b.count - a.count);
        };

        window.render = () => {
            const app = document.getElementById('app');
            const stats = getStats();
            
            app.innerHTML = `
                <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b px-6 py-5 flex justify-between items-center z-50">
                    <h1 class="text-xl font-black text-rose-600">사임당FC</h1>
                    <button onclick="state.showLoginModal=true; render()" class="text-[10px] font-bold px-3 py-1.5 rounded-lg ${state.isAdmin?'bg-rose-100 text-rose-600':'bg-slate-100 text-slate-400'}">
                        ${state.isAdmin ? '관리자 모드' : '로그인'}
                    </button>
                </header>

                <main class="p-5 max-w-md mx-auto animate-fade-in">
                    ${state.view === 'dashboard' ? `
                        <div class="bg-rose-600 rounded-[2.5rem] p-8 text-white shadow-xl shadow-rose-200 text-center mb-6">
                            <p class="text-[10px] font-bold opacity-70 mb-2">이달의 출석왕</p>
                            <h2 class="text-4xl font-black">${stats[0]?.count > 0 ? stats[0].name : '기록 없음'}</h2>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="state.view='attendance'; render()" class="bg-white p-6 rounded-[2rem] border shadow-sm font-bold flex flex-col items-center gap-2 active:scale-95 transition-transform">
                                <i data-lucide="check-circle" class="text-rose-500"></i>출석부
                            </button>
                            <button onclick="state.view='ranking'; render()" class="bg-white p-6 rounded-[2rem] border shadow-sm font-bold flex flex-col items-center gap-2 active:scale-95 transition-transform">
                                <i data-lucide="tally-5" class="text-amber-500"></i>순위표
                            </button>
                        </div>
                    ` : state.view === 'attendance' ? `
                        <div class="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl border">
                            <button onclick="state.currentDate.setDate(state.currentDate.getDate()-1); render()"><i data-lucide="chevron-left"></i></button>
                            <span class="font-black text-slate-700">${state.currentDate.toLocaleDateString()}</span>
                            <button onclick="state.currentDate.setDate(state.currentDate.getDate()+1); render()"><i data-lucide="chevron-right"></i></button>
                        </div>
                        <div class="bg-white rounded-3xl border divide-y overflow-hidden shadow-sm">
                            ${state.players.map(p => {
                                const checked = state.attendance[`${state.currentDate.toISOString().split('T')[0]}-${p.id}`];
                                return `
                                    <div onclick="toggleCheck(${p.id})" class="p-5 flex justify-between items-center active:bg-rose-50 transition-colors cursor-pointer">
                                        <span class="font-bold text-slate-700">${p.name}</span>
                                        <div class="flex items-center gap-2">
                                            <span class="text-[10px] font-black ${checked?'text-rose-600':'text-slate-300'}">${checked?'출석완료':'미출석'}</span>
                                            <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${checked?'bg-rose-600 border-rose-600 text-white':'border-slate-200'}">
                                                ${checked?'<i data-lucide="check" class="w-4 h-4"></i>':''}
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    ` : `
                        <div class="flex p-1 bg-slate-100 rounded-xl mb-6">
                            <button onclick="state.rankingTab='monthly'; render()" class="flex-1 py-3 text-xs font-bold rounded-lg ${state.rankingTab==='monthly'?'bg-white shadow-sm text-rose-600':'text-slate-400'}">월간</button>
                            <button onclick="state.rankingTab='total'; render()" class="flex-1 py-3 text-xs font-bold rounded-lg ${state.rankingTab==='total'?'bg-white shadow-sm text-rose-600':'text-slate-400'}">누적</button>
                        </div>
                        <div class="space-y-3">
                            ${stats.filter(s => s.count > 0).map((s, i) => `
                                <div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm">
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs font-black text-slate-300 w-4">${i+1}</span>
                                        <span class="font-bold text-slate-700">${s.name}</span>
                                    </div>
                                    <span class="font-black text-rose-600">${s.count}회</span>
                                </div>
                            `).join('')}
                            ${stats.filter(s => s.count > 0).length === 0 ? '<p class="text-center py-20 text-slate-400 font-bold">기록된 데이터가 없습니다.</p>' : ''}
                        </div>
                    `}
                </main>

                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/90 backdrop-blur-md rounded-[2.5rem] p-2 flex justify-around shadow-2xl z-50">
                    <button onclick="state.view='dashboard'; render()" class="p-4 ${state.view==='dashboard'?'text-white':'text-slate-500'} transition-colors"><i data-lucide="home"></i></button>
                    <button onclick="state.view='attendance'; render()" class="p-4 ${state.view==='attendance'?'text-white':'text-slate-500'} transition-colors"><i data-lucide="calendar"></i></button>
                    <button onclick="state.view='ranking'; render()" class="p-4 ${state.view==='ranking'?'text-white':'text-slate-500'} transition-colors"><i data-lucide="award"></i></button>
                </nav>

                ${state.showLoginModal ? `
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center animate-fade-in shadow-2xl">
                            <h3 class="text-xl font-black mb-6">관리자 로그인</h3>
                            <input id="pwInput" type="password" class="w-full bg-slate-100 rounded-2xl py-4 text-center text-2xl mb-6 outline-none focus:border-rose-500 transition-all" placeholder="****">
                            <div class="flex gap-2">
                                <button onclick="state.showLoginModal=false; render()" class="flex-1 py-4 font-bold text-slate-400">취소</button>
                                <button onclick="handleLogin()" class="flex-1 py-4 bg-rose-600 rounded-2xl font-bold text-white shadow-lg shadow-rose-200">확인</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
            lucide.createIcons();
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
