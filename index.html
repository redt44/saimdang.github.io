<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사임당FC 출석왕 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.96); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        input[type="password"] { letter-spacing: 0.2em; }
        #loading-screen { transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    
    <div id="loading-screen" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center">
        <div class="w-16 h-16 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center animate-bounce mb-4 shadow-xl">
            <i data-lucide="shield" class="w-8 h-8"></i>
        </div>
        <p class="text-slate-500 font-bold text-sm animate-pulse">사임당FC 데이터를 불러오는 중...</p>
    </div>

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 사진에서 확인된 실제 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyAaoiX97HAWTjzhFRb0tAxOqtb5Pv42lEA",
            authDomain: "saimdang-c8744.firebaseapp.com",
            projectId: "saimdang-c8744",
            storageBucket: "saimdang-c8744.firebasestorage.app",
            messagingSenderId: "1018293325196",
            appId: "1:1018293325196:web:f1536839991aaf241c1aa9"
        };

        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: '1234',
            showLoginModal: false,
            attendance: {},
            currentDate: new Date(),
            rankingDate: new Date(),
            rankingTab: 'monthly',
            searchTerm: '',
            players: INITIAL_PLAYERS,
            modal: null
        };

        window.updateState = function(newState, requireSync = false) {
            state = { ...state, ...newState };
            window.render();
            if (requireSync || newState.attendance || newState.players || newState.adminPassword) {
                window.saveToCloud();
            }
        };

        window.showModal = function(options) {
            window.updateState({ modal: options });
            if (options.type === 'prompt') {
                setTimeout(() => { const input = document.getElementById('modalInput'); if (input) input.focus(); }, 50);
            }
        };

        const handlers = {
            changeView: (v) => window.updateState({ view: v, searchTerm: '' }),
            closeModal: () => window.updateState({ modal: null }),
            handleModalConfirm: () => {
                const m = state.modal;
                let val = null;
                if (m.type === 'prompt') {
                    const input = document.getElementById('modalInput');
                    val = input ? input.value : '';
                }
                window.updateState({ modal: null }); 
                if (m.onConfirm) setTimeout(() => m.onConfirm(val), 10);
            },
            toggleLoginModal: (show) => {
                if (state.isAdmin && show) {
                    window.showModal({ type: 'confirm', title: '로그아웃', message: '관리자 모드를 해제하시겠습니까?', onConfirm: () => window.updateState({ isAdmin: false, view: state.view === 'settings' ? 'dashboard' : state.view }) });
                    return;
                }
                window.updateState({ showLoginModal: show });
            },
            handleLogin: () => {
                const input = document.getElementById('pwInput');
                if (input && input.value === state.adminPassword) {
                    window.updateState({ isAdmin: true, showLoginModal: false });
                } else {
                    window.showModal({ type: 'alert', title: '로그인 실패', message: '비밀번호가 올바르지 않습니다.' });
                }
            },
            updateAdminPw: () => {
                window.showModal({ type: 'prompt', title: '비밀번호 확인', message: '보안을 위해 현재 비밀번호를 입력하세요.', isPassword: true, onConfirm: (current) => {
                        if (current !== state.adminPassword) {
                            window.showModal({ type: 'alert', title: '인증 실패', message: '현재 비밀번호가 일치하지 않습니다.' });
                            return;
                        }
                        setTimeout(() => window.showModal({ type: 'prompt', title: '새 비밀번호', message: '새롭게 사용할 비밀번호를 입력하세요.', isPassword: true, onConfirm: (next) => {
                                    if (next && next.trim()) {
                                        window.updateState({ adminPassword: next.trim() }, true);
                                        window.showModal({ type: 'alert', title: '변경 완료', message: '비밀번호가 성공적으로 변경되었습니다.' });
                                    }
                                }
                            }), 300);
                    }
                });
            },
            addPlayer: () => {
                window.showModal({ type: 'prompt', title: '선수 등록', message: '추가할 선수의 이름을 입력해주세요.', isPassword: false, onConfirm: (name) => {
                        if (name && name.trim()) {
                            const nextId = state.players.length > 0 ? Math.max(...state.players.map(p => p.id)) + 1 : 1;
                            window.updateState({ players: [...state.players, { id: nextId, name: name.trim() }] }, true);
                        }
                    }
                });
            },
            delPlayer: (id, name) => {
                window.showModal({ type: 'confirm', title: '선수 삭제', message: `'${name}' 선수를 삭제하시겠습니까?`, onConfirm: () => {
                        window.updateState({ players: state.players.filter(p => p.id !== id) }, true);
                    }
                });
            },
            toggleCheck: (pid) => {
                if (!state.isAdmin) return;
                const today = `${state.currentDate.getFullYear()}-${String(state.currentDate.getMonth() + 1).padStart(2, '0')}-${String(state.currentDate.getDate()).padStart(2, '0')}`;
                const key = `${today}-${pid}`;
                state.attendance[key] = !state.attendance[key];
                window.updateState({ attendance: state.attendance }, true);
            },
            adjustDate: (val) => { const d = new Date(state.currentDate); d.setDate(d.getDate() + val); window.updateState({ currentDate: d }); },
            adjustMonth: (val) => { const d = new Date(state.rankingDate); d.setMonth(d.getMonth() + val); window.updateState({ rankingDate: d }); }
        };
        Object.keys(handlers).forEach(key => window[key] = handlers[key]);

        const getStats = (type, dateObj = state.rankingDate) => {
            const isMonthly = type === 'monthly';
            const prefix = isMonthly ? `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}` : '';
            return state.players.map(p => {
                const count = Object.keys(state.attendance).filter(k => (isMonthly ? k.startsWith(prefix) : true) && k.endsWith(`-${p.id}`) && state.attendance[k]).length;
                return { ...p, count };
            }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        };

        const processRankings = (stats) => {
            const groups = []; let currentRank = 1;
            stats.forEach((s, i) => {
                if (i > 0 && s.count < stats[i-1].count) currentRank = i + 1; 
                const group = groups.find(g => g.count === s.count);
                if (group) group.players.push(s); 
                else groups.push({ rank: currentRank, count: s.count, players: [s] });
            });
            return groups;
        };

        window.render = function() {
            const app = document.getElementById('app');
            const currentScrollY = window.scrollY;
            const topGroups = processRankings(getStats('monthly', state.currentDate)).filter(g => g.count > 0);
            const totalGroups = processRankings(getStats('total')).filter(g => g.count > 0);
            const rankingGroups = processRankings(getStats(state.rankingTab)).filter(g => g.count > 0);
            const top1Monthly = topGroups[0] || { count: 0, players: [] };
            const totalTop1 = totalGroups[0] || { count: 0, players: [] };

            const formatTop1Names = (players) => {
                if (!players || players.length === 0) return '<h2 class="text-3xl font-black mb-4 tracking-tight">기록 없음</h2>';
                const displayPlayers = players.slice(0, 3);
                const moreCount = players.length - 3;
                const namesHtml = displayPlayers.map(p => `<span class="text-2xl font-black tracking-tight leading-none">${p.name}</span>`).join('<span class="text-2xl font-black text-white/50 leading-none mr-1">,</span>');
                const moreHtml = moreCount > 0 ? `<span class="text-sm font-bold text-white/90 leading-none mb-0.5 ml-1 bg-white/20 px-2 py-1 rounded-lg">외 ${moreCount}명</span>` : '';
                return `<div class="flex flex-wrap items-end gap-y-2 mb-4 min-h-[32px]">${namesHtml}${moreHtml}</div>`;
            };

            app.innerHTML = `
                <header class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-100 z-50 px-6 py-5">
                    <div class="max-w-md mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-11 h-11 bg-slate-100 rounded-2xl flex items-center justify-center shadow-md overflow-hidden border border-slate-200">
                                <img src="01.jpg" alt="로고" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <i data-lucide="shield" class="text-slate-400 w-5 h-5 hidden"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-black text-slate-800 leading-none tracking-tighter">사임당FC</h1>
                                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Attendance System</p>
                            </div>
                        </div>
                        <button onclick="toggleLoginModal(true)" class="px-4 py-2 rounded-xl text-[10px] font-black transition-all ${state.isAdmin ? 'bg-rose-50 text-rose-600 ring-1 ring-rose-100' : 'bg-slate-100 text-slate-400'}">
                            ${state.isAdmin ? 'ADMIN ACTIVE' : 'ADMIN LOGIN'}
                        </button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-5 space-y-6">
                    ${state.view === 'dashboard' ? `
                        <div class="animate-fade-in space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-gradient-to-br from-rose-500 to-rose-600 rounded-[32px] p-5 text-white shadow-lg shadow-rose-900/10 relative overflow-hidden">
                                    <div class="bg-white/20 w-fit px-3 py-1 rounded-full text-[10px] font-black mb-3">${state.currentDate.getMonth()+1}월 랭킹</div>
                                    ${formatTop1Names(top1Monthly.players)}
                                    <div class="bg-white/20 w-fit px-3 py-1.5 rounded-xl font-black text-base shadow-sm">${top1Monthly.count} <span class="text-xs ml-0.5 font-bold">회</span></div>
                                </div>
                                <div class="bg-gradient-to-br from-amber-400 to-orange-500 rounded-[32px] p-5 text-white shadow-lg shadow-orange-900/10 relative overflow-hidden">
                                    <div class="bg-white/20 w-fit px-3 py-1 rounded-full text-[10px] font-black mb-3">누적 랭킹</div>
                                    ${formatTop1Names(totalTop1.players)}
                                    <div class="bg-white/20 w-fit px-3 py-1.5 rounded-xl font-black text-base shadow-sm">${totalTop1.count} <span class="text-xs ml-0.5 font-bold">회</span></div>
                                </div>
                            </div>
                            <div class="bg-white rounded-[40px] p-7 shadow-sm border border-slate-100">
                                <h3 class="text-lg font-black text-slate-800 flex items-center gap-2 mb-6"><i data-lucide="award" class="text-amber-500 w-5 h-5"></i> 월간 랭킹 TOP 5</h3>
                                <div class="space-y-4">
                                    ${topGroups.slice(0, 5).map((group, i) => `
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-4 flex-1">
                                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-lg font-black ${i === 0 ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300'}">
                                                    ${i < 3 ? ['🥇','🥈','🥉'][i] : group.rank}
                                                </div>
                                                <span class="font-black text-slate-700 text-lg">${group.players.map(p=>p.name).join(', ')}</span>
                                            </div>
                                            <p class="text-xl font-black text-rose-600">${group.count}<span class="text-xs ml-0.5 font-bold text-slate-300">회</span></p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : state.view === 'attendance' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-5">
                                <div class="flex items-center justify-between">
                                    <button onclick="adjustDate(-1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex border border-slate-100"><i data-lucide="chevron-left" class="w-6 h-6 m-auto text-slate-400"></i></button>
                                    <div class="text-center">
                                        <p class="text-[10px] font-black text-rose-500">${state.currentDate.getFullYear()}.${state.currentDate.getMonth()+1}</p>
                                        <h2 class="text-2xl font-black text-slate-800">${state.currentDate.getDate()}일 출석부</h2>
                                    </div>
                                    <button onclick="adjustDate(1)" class="w-12 h-12 bg-slate-50 rounded-2xl flex border border-slate-100"><i data-lucide="chevron-right" class="w-6 h-6 m-auto text-slate-400"></i></button>
                                </div>
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5"></i>
                                    <input type="text" placeholder="선수 검색..." oninput="state.searchTerm=this.value; window.renderAttendanceList()" class="w-full bg-slate-50 rounded-2xl py-5 pl-14 pr-6 text-sm outline-none">
                                </div>
                            </div>
                            <div id="attendanceItems" class="bg-white rounded-[40px] shadow-sm border border-slate-100 divide-y divide-slate-50"></div>
                        </div>
                    ` : state.view === 'ranking' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-6 rounded-[40px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-6 text-center">
                                <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                                    <button onclick="window.updateState({rankingTab:'monthly'})" class="flex-1 py-3.5 text-xs font-black rounded-xl ${state.rankingTab==='monthly'?'bg-white text-rose-600':'text-slate-400'}">월간 순위</button>
                                    <button onclick="window.updateState({rankingTab:'total'})" class="flex-1 py-3.5 text-xs font-black rounded-xl ${state.rankingTab==='total'?'bg-white text-rose-600':'text-slate-400'}">전체 누적</button>
                                </div>
                                ${state.rankingTab === 'monthly' ? `
                                    <div class="flex items-center justify-center gap-8">
                                        <button onclick="adjustMonth(-1)" class="text-slate-300"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                                        <p class="font-black text-slate-800 text-xl">${state.rankingDate.getFullYear()}년 ${state.rankingDate.getMonth()+1}월</p>
                                        <button onclick="adjustMonth(1)" class="text-slate-300"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                                    </div>
                                ` : '<p class="font-black text-rose-600 text-xl py-2">전체 누적 순위</p>'}
                            </div>
                            <div class="space-y-3 pb-6">
                                ${rankingGroups.map((group, i) => `
                                    <div class="bg-white rounded-[24px] border border-slate-100 shadow-sm p-5 flex items-center justify-between">
                                        <div class="flex items-center gap-4">
                                            <span class="w-8 text-center font-black text-xl ${i<3?'text-rose-500':'text-slate-300'}">${group.rank}</span>
                                            <div class="flex flex-wrap gap-1">${group.players.map(p => `<span class="text-sm font-bold text-slate-600 bg-slate-50 px-2 py-0.5 rounded-md">${p.name}</span>`).join('')}</div>
                                        </div>
                                        <div class="text-xl font-black text-slate-800">${group.count}<span class="text-[10px] font-bold text-slate-400 ml-1">회</span></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : state.view === 'settings' ? `
                        <div class="space-y-6 animate-fade-in pb-10">
                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <h3 class="font-black text-slate-800 mb-6">비밀번호 변경</h3>
                                <button onclick="updateAdminPw()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold">변경하기</button>
                            </div>
                            <div class="bg-white rounded-[40px] p-8 border border-slate-100 shadow-sm">
                                <div class="flex items-center justify-between mb-8">
                                    <h3 class="font-black text-slate-800">선수 명단 관리</h3>
                                    <button onclick="addPlayer()" class="px-5 py-2.5 bg-rose-600 text-white rounded-xl font-black text-xs">등록</button>
                                </div>
                                <div class="space-y-3">
                                    ${state.players.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <span class="font-bold text-slate-700">${p.name}</span>
                                            <button onclick="delPlayer(${p.id}, '${p.name}')" class="text-slate-300 hover:text-rose-500"><i data-lucide="user-minus" class="w-5 h-5"></i></button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </main>

                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900/95 backdrop-blur-2xl rounded-[40px] p-3 shadow-2xl z-50 flex justify-between items-center">
                    <button onclick="changeView('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='dashboard'?'text-white':'text-slate-500'}"><i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="text-[10px] font-bold">홈</span></button>
                    <button onclick="changeView('attendance')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='attendance'?'text-white':'text-slate-500'}"><i data-lucide="check-square" class="w-6 h-6"></i><span class="text-[10px] font-bold">출석</span></button>
                    <button onclick="changeView('ranking')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='ranking'?'text-white':'text-slate-500'}"><i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-[10px] font-bold">순위</span></button>
                    ${state.isAdmin ? `<button onclick="changeView('settings')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='settings'?'text-white':'text-slate-500'}"><i data-lucide="user-cog" class="w-6 h-6"></i><span class="text-[10px] font-bold">설정</span></button>` : ''}
                </nav>
                
                ${state.showLoginModal ? `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-xs rounded-[40px] p-8 text-center shadow-2xl">
                            <h3 class="text-2xl font-black mb-8">관리자 로그인</h3>
                            <input id="pwInput" type="password" onkeyup="if(event.key==='Enter')handleLogin()" placeholder="••••" class="w-full bg-slate-50 rounded-2xl py-6 text-center text-3xl mb-8 outline-none">
                            <div class="flex gap-4">
                                <button onclick="toggleLoginModal(false)" class="flex-1 py-5 bg-slate-100 text-slate-400 font-bold rounded-2xl">닫기</button>
                                <button onclick="handleLogin()" class="flex-1 py-5 bg-rose-600 text-white font-bold rounded-2xl">확인</button>
                            </div>
                        </div>
                    </div>` : ''}

                ${state.modal ? `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[120] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center">
                            <h3 class="text-2xl font-black mb-4">${state.modal.title}</h3>
                            <p class="text-sm text-slate-500 font-bold mb-8 whitespace-pre-wrap">${state.modal.message}</p>
                            ${state.modal.type === 'prompt' ? `<input id="modalInput" type="${state.modal.isPassword?'password':'text'}" class="w-full bg-slate-50 rounded-2xl py-5 text-center text-xl mb-8 outline-none" onkeyup="if(event.key==='Enter')handleModalConfirm()">` : ''}
                            <div class="flex gap-4">
                                ${state.modal.type !== 'alert' ? `<button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">취소</button>` : ''}
                                <button onclick="handleModalConfirm()" class="flex-1 py-4 bg-rose-600 text-white font-bold rounded-2xl">확인</button>
                            </div>
                        </div>
                    </div>` : ''}
            `;
            lucide.createIcons();
            if (state.view === 'attendance') window.renderAttendanceList();
            window.scrollTo(0, currentScrollY);
        };

        window.renderAttendanceList = function() {
            const container = document.getElementById('attendanceItems');
            if (!container) return;
            const today = `${state.currentDate.getFullYear()}-${String(state.currentDate.getMonth() + 1).padStart(2, '0')}-${String(state.currentDate.getDate()).padStart(2, '0')}`;
            const filtered = state.players.filter(p => p.name.includes(state.searchTerm));
            
            container.innerHTML = filtered.map(p => {
                const isCheck = state.attendance[`${today}-${p.id}`];
                return `
                    <div onclick="toggleCheck(${p.id})" class="flex items-center justify-between p-6 cursor-pointer active:bg-slate-50">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-[10px] font-bold text-slate-300 border border-slate-100">${p.id}</span>
                            <span class="text-xl font-bold text-slate-700">${p.name}</span>
                        </div>
                        <div class="px-5 py-2.5 rounded-2xl text-sm font-black ${isCheck ? 'bg-green-100 text-green-700' : 'bg-slate-50 text-slate-300'}">
                            ${isCheck ? '출석 완료' : '결석'}
                        </div>
                    </div>
                `;
            }).join('');
        };

        const initCloud = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        // 깃허브 배포용 문서 경로
                        const docRef = doc(db, 'saimdang_data', 'main_doc');

                        onSnapshot(docRef, (snapshot) => {
                            if (snapshot.exists()) {
                                const data = snapshot.data();
                                state.attendance = data.attendance || {};
                                state.players = data.players || INITIAL_PLAYERS;
                                if(data.adminPassword) state.adminPassword = data.adminPassword;
                                
                                const loader = document.getElementById('loading-screen');
                                if(loader) {
                                    loader.style.opacity = '0';
                                    setTimeout(() => loader.style.display = 'none', 500);
                                }
                                window.render();
                            } else {
                                setDoc(docRef, { attendance: {}, players: INITIAL_PLAYERS, adminPassword: '1234' });
                            }
                        });

                        window.saveToCloud = async () => {
                            await setDoc(docRef, {
                                attendance: state.attendance,
                                players: state.players,
                                adminPassword: state.adminPassword
                            });
                        };
                    }
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loading-screen').innerHTML = '<p class="p-10 text-center font-bold">서버 연결에 실패했습니다.<br>잠시 후 다시 시도해 주세요.</p>';
            }
        };

        window.addEventListener('DOMContentLoaded', initCloud);
    </script>
</body>
</html>
