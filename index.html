<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사임당FC 출석왕 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.96); }
        #loading-screen { transition: opacity 0.5s; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    
    <!-- 로딩 및 상태 메시지 화면 -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[200] flex flex-col items-center justify-center p-6 text-center">
        <div id="loader-icon" class="w-16 h-16 bg-rose-50 text-rose-600 rounded-3xl flex items-center justify-center animate-bounce mb-4 shadow-xl border border-rose-100">
            <i data-lucide="shield" class="w-8 h-8"></i>
        </div>
        <p id="loading-text" class="text-slate-500 font-bold text-sm leading-relaxed">
            사임당FC 서버에 연결을 시도하고 있습니다...
        </p>
        
        <!-- 상세 에러 안내창 (기본 숨김) -->
        <div id="error-guide" class="hidden mt-6 w-full max-w-xs space-y-4">
            <div class="bg-rose-50 p-5 rounded-2xl text-rose-600 text-xs text-left border border-rose-100 leading-relaxed">
                <p class="font-black text-sm mb-2">🚨 연결 확인 사항</p>
                <ul class="space-y-2 list-disc ml-4">
                    <li><strong>Authentication:</strong> '익명' 로그인이 '사용 설정됨'인지 확인</li>
                    <li><strong>Firestore:</strong> 데이터베이스가 생성되었는지 확인</li>
                    <li><strong>규칙(Rules):</strong> 규칙 게시 후 1분이 지났는지 확인</li>
                </ul>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-bold shadow-lg">다시 연결 시도하기</button>
        </div>
    </div>

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaoiX97HAWTjzhFRb0tAxOqtb5Pv42lEA",
            authDomain: "saimdang-c8744.firebaseapp.com",
            projectId: "saimdang-c8744",
            storageBucket: "saimdang-c8744.firebasestorage.app",
            messagingSenderId: "1018293325196",
            appId: "1:1018293325196:web:f1536839991aaf241c1aa9"
        };

        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: '1234',
            showLoginModal: false,
            attendance: {},
            currentDate: new Date(),
            rankingDate: new Date(),
            rankingTab: 'monthly',
            players: INITIAL_PLAYERS
        };

        let db, docRef;

        const initFirebase = async () => {
            const loadingText = document.getElementById('loading-text');
            const errorGuide = document.getElementById('error-guide');
            const loaderIcon = document.getElementById('loader-icon');
            
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                
                // Firestore 초기화 (오프라인 기능 강화)
                db = initializeFirestore(app, {
                    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
                });
                
                // 익명 로그인 시도
                const userCredential = await signInAnonymously(auth).catch(err => {
                    console.error("Auth Error:", err.code);
                    throw new Error("AUTH_FAIL");
                });

                const appId = "saimdang-v1";
                docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_store');

                // 데이터 실시간 감시 (실제 접속 테스트)
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        state.attendance = data.attendance || {};
                        state.players = data.players || INITIAL_PLAYERS;
                        state.adminPassword = data.adminPassword || '1234';
                    } else {
                        setDoc(docRef, { 
                            attendance: {}, 
                            players: INITIAL_PLAYERS, 
                            adminPassword: '1234' 
                        });
                    }
                    hideLoading();
                    render();
                }, (err) => {
                    console.error("Firestore Error:", err.code);
                    loadingText.innerHTML = `<span class="text-rose-600">데이터베이스 접근 거부</span><br><br>Firestore [규칙] 탭에서 [게시]를 눌러주세요.`;
                    errorGuide.classList.remove('hidden');
                });

            } catch (error) {
                console.error(error);
                loaderIcon.classList.replace('text-rose-600', 'text-slate-400');
                if(error.message === "AUTH_FAIL") {
                    loadingText.innerHTML = `<span class="text-rose-600 font-black">인증 서버 연결 실패</span><br><br>Authentication 메뉴에서 '익명' 로그인이<br>'사용 설정됨'인지 다시 확인해주세요.`;
                } else {
                    loadingText.innerHTML = "네트워크 연결 오류가 발생했습니다.<br>잠시 후 다시 시도해주세요.";
                }
                errorGuide.classList.remove('hidden');
            }
        };

        const hideLoading = () => {
            const loader = document.getElementById('loading-screen');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        };

        const saveToCloud = async () => {
            if (!docRef) return;
            try {
                await setDoc(docRef, {
                    attendance: state.attendance,
                    players: state.players,
                    adminPassword: state.adminPassword
                });
            } catch (err) {
                console.error("저장 실패:", err);
            }
        };

        const getYMD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getStats = (type, dateObj = state.rankingDate) => {
            const isMonthly = type === 'monthly';
            const prefix = isMonthly ? `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}` : '';
            return state.players.map(p => {
                const count = Object.keys(state.attendance).filter(k => 
                    (isMonthly ? k.startsWith(prefix) : true) && k.endsWith(`-${p.id}`) && state.attendance[k]
                ).length;
                return { ...p, count };
            }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        };

        const processRankings = (stats) => {
            const groups = [];
            let currentRank = 1;
            stats.forEach((s, i) => {
                if (i > 0 && s.count < stats[i-1].count) currentRank = i + 1;
                const group = groups.find(g => g.count === s.count);
                if (group) group.players.push(s);
                else groups.push({ rank: currentRank, count: s.count, players: [s] });
            });
            return groups;
        };

        window.changeView = (v) => { state.view = v; render(); };
        window.toggleLoginModal = (show) => { 
            if (state.isAdmin && show) {
                if(confirm('관리자 모드를 해제하시겠습니까?')) {
                    state.isAdmin = false;
                    render();
                }
            } else {
                state.showLoginModal = show; 
                render();
            }
        };
        window.handleLogin = () => {
            const pw = document.getElementById('pwInput').value;
            if (pw === state.adminPassword) {
                state.isAdmin = true;
                state.showLoginModal = false;
                render();
            } else {
                alert('비밀번호가 틀립니다.');
            }
        };
        window.adjustDate = (v) => { state.currentDate.setDate(state.currentDate.getDate() + v); render(); };
        window.toggleCheck = async (pid) => {
            if (!state.isAdmin) return;
            const key = `${getYMD(state.currentDate)}-${pid}`;
            state.attendance[key] = !state.attendance[key];
            render();
            await saveToCloud();
        };

        function render() {
            const app = document.getElementById('app');
            const stats = getStats(state.rankingTab);
            const groups = processRankings(stats).filter(g => g.count > 0);
            
            app.innerHTML = `
                <header class="sticky top-0 bg-white/95 backdrop-blur-md border-b border-slate-100 z-50 px-6 py-5 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-rose-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-rose-200">
                            <i data-lucide="shield" class="w-5 h-5"></i>
                        </div>
                        <h1 class="text-xl font-black text-slate-800 tracking-tighter">사임당FC</h1>
                    </div>
                    <button onclick="toggleLoginModal(true)" class="px-4 py-2 rounded-xl text-[10px] font-black ${state.isAdmin ? 'bg-rose-50 text-rose-600 border border-rose-100' : 'bg-slate-100 text-slate-400'}">
                        ${state.isAdmin ? '관리자 모드' : '로그인'}
                    </button>
                </header>

                <main class="max-w-md mx-auto p-5 pb-32">
                    ${state.view === 'dashboard' ? renderDashboard() : state.view === 'attendance' ? renderAttendance() : renderRanking()}
                </main>

                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900/95 backdrop-blur-xl rounded-[32px] p-2 shadow-2xl z-50 flex justify-around">
                    <button onclick="changeView('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='dashboard'?'text-white':'text-slate-500'}">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px] font-bold">홈</span>
                    </button>
                    <button onclick="changeView('attendance')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='attendance'?'text-white':'text-slate-500'}">
                        <i data-lucide="check-square" class="w-5 h-5"></i><span class="text-[10px] font-bold">출석체크</span>
                    </button>
                    <button onclick="changeView('ranking')" class="flex-1 py-3 flex flex-col items-center gap-1 ${state.view==='ranking'?'text-white':'text-slate-500'}">
                        <i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[10px] font-bold">출석순위</span>
                    </button>
                </nav>

                ${state.showLoginModal ? `
                    <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-fade-in">
                        <div class="bg-white w-full max-w-xs rounded-[32px] p-8 text-center shadow-2xl">
                            <h3 class="text-xl font-black mb-6">관리자 인증</h3>
                            <input id="pwInput" type="password" placeholder="비밀번호 입력" class="w-full bg-slate-100 rounded-2xl py-4 text-center text-2xl mb-6 outline-none focus:ring-2 focus:ring-rose-500">
                            <div class="flex gap-3">
                                <button onclick="toggleLoginModal(false)" class="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-400 text-sm">취소</button>
                                <button onclick="handleLogin()" class="flex-1 py-4 bg-rose-600 rounded-2xl font-bold text-white text-sm">확인</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
            lucide.createIcons();
        }

        function renderDashboard() {
            const todayStats = getStats('monthly', new Date());
            const top1 = todayStats[0]?.count > 0 ? todayStats[0].name : "기록 없음";
            return `
                <div class="animate-fade-in space-y-6">
                    <div class="bg-gradient-to-br from-rose-500 to-rose-600 rounded-[32px] p-6 text-white shadow-xl shadow-rose-200">
                        <p class="text-[10px] font-black opacity-80 mb-2 uppercase tracking-widest text-center">${new Date().getMonth()+1}월 현재 출석 1위</p>
                        <h2 class="text-4xl font-black text-center mb-1 tracking-tighter">${top1}</h2>
                        <p class="text-center text-rose-100 text-xs font-bold">${todayStats[0]?.count || 0}회 출석 중</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="changeView('attendance')" class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex flex-col items-center gap-3">
                            <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center"><i data-lucide="calendar"></i></div>
                            <span class="font-bold text-sm text-slate-700">출석 체크</span>
                        </div>
                        <div onclick="changeView('ranking')" class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex flex-col items-center gap-3">
                            <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center"><i data-lucide="award"></i></div>
                            <span class="font-bold text-sm text-slate-700">순위 보기</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAttendance() {
            const today = getYMD(state.currentDate);
            return `
                <div class="animate-fade-in space-y-4">
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex items-center justify-between sticky top-[90px] z-10">
                        <button onclick="adjustDate(-1)" class="p-2"><i data-lucide="chevron-left"></i></button>
                        <div class="text-center">
                            <p class="text-[10px] font-bold text-rose-500">${state.currentDate.getFullYear()}.${state.currentDate.getMonth()+1}</p>
                            <h2 class="text-xl font-black">${state.currentDate.getDate()}일 출석부</h2>
                        </div>
                        <button onclick="adjustDate(1)" class="p-2"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div class="bg-white rounded-[32px] border border-slate-100 shadow-sm divide-y divide-slate-50 overflow-hidden">
                        ${state.players.map(p => {
                            const isCheck = state.attendance[`${today}-${p.id}`];
                            return `
                                <div onclick="toggleCheck(${p.id})" class="flex items-center justify-between p-5 active:bg-slate-50 transition-colors cursor-pointer">
                                    <span class="font-bold text-slate-700">${p.name}</span>
                                    <div class="px-4 py-1.5 rounded-xl text-xs font-black ${isCheck ? 'bg-green-100 text-green-700' : 'bg-slate-50 text-slate-300'}">
                                        ${isCheck ? '출결 완료' : '미출결'}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderRanking() {
            const stats = getStats(state.rankingTab);
            const groups = processRankings(stats).filter(g => g.count > 0);
            return `
                <div class="animate-fade-in space-y-6">
                    <div class="flex p-1 bg-slate-100 rounded-2xl">
                        <button onclick="state.rankingTab='monthly'; render()" class="flex-1 py-3 text-xs font-bold rounded-xl ${state.rankingTab==='monthly'?'bg-white shadow-sm text-rose-600':'text-slate-400'}">월간</button>
                        <button onclick="state.rankingTab='total'; render()" class="flex-1 py-3 text-xs font-bold rounded-xl ${state.rankingTab==='total'?'bg-white shadow-sm text-rose-600':'text-slate-400'}">누적</button>
                    </div>
                    <div class="space-y-3">
                        ${groups.length === 0 ? `<p class="text-center text-slate-400 py-10 font-bold">아직 출석 기록이 없습니다.</p>` : groups.map(g => `
                            <div class="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center font-black text-slate-400 text-sm">${g.rank}</div>
                                    <div class="flex flex-wrap gap-1">
                                        ${g.players.map(p => `<span class="font-bold text-slate-700">${p.name}</span>`).join(', ')}
                                    </div>
                                </div>
                                <div class="text-rose-600 font-black text-lg">${g.count}<span class="text-[10px] text-slate-300 ml-0.5">회</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', initFirebase);
    </script>
</body>
</html>
