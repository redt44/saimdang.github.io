<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사임당FC 출석왕 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.96); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 pb-28">
    <div id="app"></div>

    <script>
        // 1. 초기 데이터 및 상태 정의
        const INITIAL_PLAYERS = [
            { id: 1, name: '강세라' }, { id: 2, name: '강은정' }, { id: 3, name: '고정희' },
            { id: 4, name: '권은빈' }, { id: 5, name: '김다혜' }, { id: 6, name: '김미정' },
            { id: 7, name: '김민경' }, { id: 8, name: '김민혜' }, { id: 9, name: '김소영' },
            { id: 10, name: '김수연' }, { id: 11, name: '김아진' }, { id: 12, name: '김은주' },
            { id: 13, name: '김자민' }, { id: 14, name: '김주리' }, { id: 15, name: '김현민' },
            { id: 16, name: '방수연' }, { id: 17, name: '배은빈' }, { id: 18, name: '송다연' },
            { id: 19, name: '신해연' }, { id: 20, name: '양양은' }, { id: 21, name: '오유연' },
            { id: 22, name: '오혜령' }, { id: 23, name: '우미화' }, { id: 24, name: '이수빈' },
            { id: 25, name: '이혜미' }, { id: 26, name: '장이현' }, { id: 27, name: '전지원' },
            { id: 28, name: '정연희' }, { id: 29, name: '차은솔' }, { id: 30, name: '최민지' },
            { id: 31, name: '한새미' }, { id: 32, name: '함수인' }, { id: 33, name: '홍은경' },
            { id: 34, name: '황보영' }
        ];

        let state = {
            view: 'dashboard',
            isAdmin: false,
            adminPassword: localStorage.getItem('saimidang_admin_pw') || '1234',
            showLoginModal: false,
            loginInput: '',
            attendance: JSON.parse(localStorage.getItem('saimidang_attendance')) || {},
            currentDate: new Date(),
            rankingDate: new Date(),
            rankingTab: 'monthly',
            searchTerm: '',
            players: JSON.parse(localStorage.getItem('saimidang_players')) || INITIAL_PLAYERS
        };

        // 2. 핵심 상태 업데이트 함수
        function updateState(newState) {
            state = { ...state, ...newState };
            localStorage.setItem('saimidang_attendance', JSON.stringify(state.attendance));
            localStorage.setItem('saimidang_players', JSON.stringify(state.players));
            localStorage.setItem('saimidang_admin_pw', state.adminPassword);
            render();
        }

        // 3. 전역 함수 명시적 할당 (onclick 연동 보장)
        const handlers = {
            changeView: (v) => updateState({ view: v, searchTerm: '' }),
            
            toggleLoginModal: (show) => {
                if (state.isAdmin && show) {
                    if (confirm("관리자 모드를 종료하시겠습니까?")) {
                        updateState({ isAdmin: false, view: state.view === 'settings' ? 'dashboard' : state.view });
                    }
                    return;
                }
                updateState({ showLoginModal: show, loginInput: '' });
            },

            handleLogin: () => {
                const input = document.getElementById('pwInput');
                const val = input ? input.value : state.loginInput;
                if (val === state.adminPassword) {
                    updateState({ isAdmin: true, showLoginModal: false });
                } else {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            },

            updateAdminPw: () => {
                const nextPw = prompt("새로운 관리자 비밀번호를 입력하세요.", state.adminPassword);
                if (nextPw !== null && nextPw.trim() !== "") {
                    updateState({ adminPassword: nextPw.trim() });
                    alert("비밀번호가 변경되었습니다.");
                }
            },

            addPlayer: () => {
                const name = prompt("추가할 선수의 이름을 입력하세요.");
                if (name && name.trim() !== "") {
                    const maxId = state.players.length > 0 ? Math.max(...state.players.map(p => p.id)) : 0;
                    const newPlayers = [...state.players, { id: maxId + 1, name: name.trim() }];
                    updateState({ players: newPlayers });
                }
            },

            delPlayer: (id, name) => {
                if (confirm(`'${name}' 선수를 삭제하시겠습니까?`)) {
                    const newPlayers = state.players.filter(p => p.id !== id);
                    const newAttendance = { ...state.attendance };
                    Object.keys(newAttendance).forEach(key => {
                        if (key.endsWith(`-${id}`)) delete newAttendance[key];
                    });
                    updateState({ players: newPlayers, attendance: newAttendance });
                }
            },

            toggleCheck: (pid) => {
                if (!state.isAdmin) return alert("관리자 로그인 후 가능합니다.");
                const today = getYMD(state.currentDate);
                const key = `${today}-${pid}`;
                updateState({ attendance: { ...state.attendance, [key]: !state.attendance[key] } });
            },

            adjustDate: (val) => {
                const d = new Date(state.currentDate);
                d.setDate(d.getDate() + val);
                updateState({ currentDate: d });
            },

            adjustMonth: (val) => {
                const d = new Date(state.rankingDate);
                d.setMonth(d.getMonth() + val);
                updateState({ rankingDate: d });
            },

            onSearch: (val) => {
                state.searchTerm = val;
                renderAttendanceList();
            }
        };

        // 전역으로 바인딩
        Object.keys(handlers).forEach(key => window[key] = handlers[key]);

        // 4. 유틸리티
        const getYMD = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const getStats = (type) => {
            const players = state.players;
            const isMonthly = type === 'monthly';
            const prefix = isMonthly ? `${state.rankingDate.getFullYear()}-${String(state.rankingDate.getMonth() + 1).padStart(2, '0')}` : '';
            return players.map(p => ({
                ...p,
                count: Object.keys(state.attendance).filter(k => 
                    (isMonthly ? k.startsWith(prefix) : true) && k.endsWith(`-${p.id}`) && state.attendance[k]
                ).length
            })).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        };

        // 5. 렌더링 함수
        function renderAttendanceList() {
            const container = document.getElementById('attendanceItems');
            if (!container) return;
            const today = getYMD(state.currentDate);
            const filtered = state.players.filter(p => p.name.includes(state.searchTerm));

            container.innerHTML = filtered.length ? filtered.map(p => {
                const isCheck = state.attendance[`${today}-${p.id}`];
                return `
                    <div onclick="toggleCheck(${p.id})" class="flex items-center justify-between p-4 cursor-pointer active:bg-slate-50 border-b border-slate-50 last:border-0 transition-all">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-[10px] font-bold text-slate-400">${p.id}</span>
                            <span class="text-lg font-bold text-slate-700">${p.name}</span>
                        </div>
                        <div class="px-4 py-2 rounded-xl text-sm font-black transition-all ${isCheck ? 'bg-green-100 text-green-700 ring-1 ring-green-200' : 'bg-slate-50 text-slate-300'}">
                            ${isCheck ? '출석' : '결석'}
                        </div>
                    </div>
                `;
            }).join('') : `<div class="p-20 text-center text-slate-300 font-bold">검색 결과가 없습니다.</div>`;
        }

        function render() {
            const app = document.getElementById('app');
            const dashboardMonth = state.currentDate.getMonth() + 1;
            const ranks = getStats('monthly');
            const topPlayer = ranks[0];

            app.innerHTML = `
                <!-- 로그인 모달 -->
                ${state.showLoginModal ? `
                    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                        <div class="bg-white w-full max-w-xs rounded-[32px] p-8 shadow-2xl animate-fade-in text-center">
                            <h3 class="text-xl font-black text-slate-800 mb-6 tracking-tight">관리자 인증</h3>
                            <input id="pwInput" type="password" oninput="state.loginInput=this.value" onkeyup="if(event.key==='Enter')handleLogin()" placeholder="••••" class="w-full bg-slate-100 border-none rounded-2xl py-5 px-6 text-center text-3xl tracking-[12px] focus:ring-2 focus:ring-rose-500 outline-none mb-6 shadow-inner">
                            <div class="flex gap-3">
                                <button onclick="toggleLoginModal(false)" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">취소</button>
                                <button onclick="handleLogin()" class="flex-1 py-4 bg-rose-600 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">확인</button>
                            </div>
                        </div>
                    </div>
                ` : ''}

                <!-- 헤더 -->
                <header class="sticky top-0 bg-white/90 backdrop-blur-xl border-b border-slate-100 z-50 px-6 py-5">
                    <div class="max-w-md mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-rose-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="shield" class="text-white w-5 h-5"></i></div>
                            <div><h1 class="text-xl font-black text-slate-800 leading-none">사임당FC</h1><p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">Women's Football Club</p></div>
                        </div>
                        <button onclick="toggleLoginModal(true)" class="px-4 py-2 rounded-xl text-[10px] font-black transition-all ${state.isAdmin ? 'bg-rose-50 text-rose-600 ring-1 ring-rose-100' : 'bg-slate-100 text-slate-400'}">
                            ${state.isAdmin ? 'ADMIN ACTIVE' : 'ADMIN LOGIN'}
                        </button>
                    </div>
                </header>

                <main class="max-w-md mx-auto p-5 pb-12">
                    ${state.view === 'dashboard' ? `
                        <div class="space-y-6 animate-fade-in">
                            <div class="bg-gradient-to-br from-rose-500 to-rose-600 rounded-[32px] p-7 text-white shadow-xl relative overflow-hidden">
                                <i data-lucide="trophy" class="absolute -right-6 -bottom-6 w-40 h-40 opacity-10"></i>
                                <h2 class="text-lg font-bold opacity-80 mb-8 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> ${dashboardMonth}월의 출석왕</h2>
                                <div class="flex items-end justify-between relative z-10">
                                    <div><p class="text-4xl font-black">${topPlayer && topPlayer.count > 0 ? topPlayer.name : '기록 대기'}</p><p class="text-sm font-bold opacity-60 mt-1 uppercase tracking-tighter">Current Leaderboard</p></div>
                                    <div class="bg-white/20 px-5 py-2.5 rounded-2xl font-black text-xl backdrop-blur-md">${topPlayer ? topPlayer.count : 0} <span class="text-xs opacity-60 ml-0.5">회</span></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div onclick="changeView('attendance')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center gap-4 cursor-pointer active:bg-slate-50 transition-all">
                                    <div class="w-14 h-14 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center"><i data-lucide="user-check" class="w-8 h-8"></i></div>
                                    <span class="font-black text-slate-700">출석 체크</span>
                                </div>
                                <div onclick="changeView('ranking')" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center gap-4 cursor-pointer active:bg-slate-50 transition-all">
                                    <div class="w-14 h-14 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center"><i data-lucide="bar-chart-big" class="w-8 h-8"></i></div>
                                    <span class="font-black text-slate-700">순위 보기</span>
                                </div>
                            </div>
                        </div>
                    ` : state.view === 'attendance' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-5">
                                <div class="flex items-center justify-between">
                                    <button onclick="adjustDate(-1)" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><i data-lucide="chevron-left" class="w-5 h-5 text-slate-400"></i></button>
                                    <div class="text-center"><p class="text-[10px] font-black text-rose-500 uppercase tracking-widest">${state.currentDate.getFullYear()}.${state.currentDate.getMonth()+1}</p><h2 class="text-2xl font-black text-slate-800">${state.currentDate.getDate()}일 출석부</h2></div>
                                    <button onclick="adjustDate(1)" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i></button>
                                </div>
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-4.5 h-4.5"></i>
                                    <input type="text" placeholder="선수 명단 검색..." oninput="onSearch(this.value)" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-6 text-sm focus:ring-2 focus:ring-rose-500 outline-none shadow-inner">
                                </div>
                            </div>
                            <div id="attendanceItems" class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50"></div>
                        </div>
                    ` : state.view === 'ranking' ? `
                        <div class="space-y-4 animate-fade-in">
                            <div class="bg-white p-5 rounded-[32px] shadow-sm border border-slate-100 sticky top-[88px] z-30 space-y-5 text-center">
                                <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                                    <button onclick="updateState({rankingTab:'monthly'})" class="flex-1 py-3 text-xs font-black rounded-xl transition-all ${state.rankingTab==='monthly'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}">월간 순위</button>
                                    <button onclick="updateState({rankingTab:'total'})" class="flex-1 py-3 text-xs font-black rounded-xl transition-all ${state.rankingTab==='total'?'bg-white text-rose-600 shadow-sm':'text-slate-400'}">전체 누적</button>
                                </div>
                                ${state.rankingTab === 'monthly' ? `
                                    <div class="flex items-center justify-center gap-6">
                                        <button onclick="adjustMonth(-1)" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><i data-lucide="chevron-left" class="w-5 h-5 text-slate-400"></i></button>
                                        <p class="font-black text-slate-800 text-lg">${state.rankingDate.getFullYear()}년 ${state.rankingDate.getMonth()+1}월</p>
                                        <button onclick="adjustMonth(1)" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center"><i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i></button>
                                    </div>
                                ` : '<p class="font-black text-slate-800 py-1">사임당FC 통산 기록</p>'}
                            </div>
                            <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50">
                                ${getStats(state.rankingTab).map((r, i) => `
                                    <div class="p-6 flex items-center justify-between">
                                        <div class="flex items-center gap-5">
                                            <span class="w-6 font-black text-2xl ${i<3?'text-rose-500':'text-slate-200'}">${i+1}</span>
                                            <div><p class="text-lg font-bold text-slate-800">${r.name}</p><p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${state.rankingTab==='monthly'?'Monthly Rank':'Total All Time'}</p></div>
                                        </div>
                                        <div class="flex items-baseline gap-1"><span class="text-3xl font-black text-rose-600">${r.count}</span><span class="text-xs font-bold text-slate-300">회</span></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : state.view === 'settings' ? `
                        <div class="space-y-6 animate-fade-in pb-10">
                            <div class="bg-white rounded-[32px] p-7 border border-slate-100 shadow-sm">
                                <h3 class="font-black text-slate-800 mb-5 flex items-center gap-2"><i data-lucide="key" class="text-rose-500 w-5 h-5"></i> 보안 설정</h3>
                                <div class="bg-slate-50 p-4 rounded-2xl mb-4">
                                    <p class="text-xs text-slate-400 font-bold mb-1 uppercase tracking-tight">Current Password</p>
                                    <p class="text-lg font-black text-slate-700 tracking-widest">${state.adminPassword.replace(/./g, '*')}</p>
                                </div>
                                <button onclick="updateAdminPw()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">비밀번호 변경하기</button>
                            </div>
                            <div class="bg-white rounded-[32px] p-7 border border-slate-100 shadow-sm">
                                <div class="flex items-center justify-between mb-8">
                                    <h3 class="font-black text-slate-800 flex items-center gap-2"><i data-lucide="users-2" class="text-rose-500 w-5 h-5"></i> 선수 명단 관리</h3>
                                    <button onclick="addPlayer()" class="px-5 py-2.5 bg-rose-600 text-white rounded-xl font-black text-xs tracking-widest shadow-md active:scale-95 transition-all">+ 추가</button>
                                </div>
                                <div class="space-y-3 max-h-[450px] overflow-y-auto pr-1 custom-scroll">
                                    ${state.players.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-transparent">
                                            <div class="flex items-center gap-4">
                                                <span class="text-[10px] font-black text-slate-300 bg-white w-6 h-6 rounded flex items-center justify-center border border-slate-100">${p.id}</span>
                                                <span class="font-bold text-slate-700 text-lg">${p.name}</span>
                                            </div>
                                            <button onclick="delPlayer(${p.id}, '${p.name}')" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </main>

                <!-- 네비게이션 -->
                <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-slate-900/95 backdrop-blur-2xl rounded-[32px] p-2.5 shadow-2xl z-50 border border-white/10 flex justify-between items-center">
                    <button onclick="changeView('dashboard')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all ${state.view==='dashboard'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[10px] font-bold">홈</span>
                    </button>
                    <button onclick="changeView('attendance')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all ${state.view==='attendance'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="calendar-check" class="w-5 h-5"></i><span class="text-[10px] font-bold">출석</span>
                    </button>
                    <button onclick="changeView('ranking')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all ${state.view==='ranking'?'text-white bg-white/10':'text-slate-500'}">
                        <i data-lucide="award" class="w-5 h-5"></i><span class="text-[10px] font-bold">순위</span>
                    </button>
                    ${state.isAdmin ? `
                        <button onclick="changeView('settings')" class="flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl transition-all ${state.view==='settings'?'text-white bg-white/10':'text-slate-500'}">
                            <i data-lucide="settings-2" class="w-5 h-5"></i><span class="text-[10px] font-bold">설정</span>
                        </button>
                    ` : ''}
                </nav>
            `;
            // 아이콘 생성 및 출석 리스트 렌더링
            try { lucide.createIcons(); } catch(e) { console.error(e); }
            if (state.view === 'attendance') renderAttendanceList();
        }

        // 초기 실행
        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
